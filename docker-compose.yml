services:

  # ── Backend: FastAPI + DataConnector ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: eia_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persiste la SQLite y los archivos parquet entre reinicios
      - sqlite_data:/app/DataConnector/Data
    restart: unless-stopped

  # ── Frontend: Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # En producción cambia esto por la URL pública del backend
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: eia_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data: